],sum:"🏛️ Solemne Vocación ✓ | ¡Terminaste! 🎉",alerts:["🏛️ SOLEMNE Vocación (30%)","💪 Confía en tu preparación"]},
];

/* ─── helpers ─── */
function t2m(t){const[h,m]=t.split(":").map(Number);return h*60+m}
function dur(a,b){let s=t2m(a),e=t2m(b);if(e<=s)e+=1440;return e-s}
function fmtDur(min){if(min>=60){const h=Math.floor(min/60);const m=min%60;return m>0?`${h}h ${m}m`:`${h}h`}return`${min}m`}
function fmtTime(t){const[h,m]=t.split(":");const hr=parseInt(h);const ap=hr>=12&&hr<24?"PM":"AM";const d=hr===0?12:hr>12?hr-12:hr;return`${d}:${m} ${ap}`}
function getNowMin(){const n=new Date();const s=new Date(n.toLocaleString("en-US",{timeZone:"America/Santiago"}));return s.getHours()*60+s.getMinutes()}
function getSantiagoDate(){const n=new Date();const s=new Date(n.toLocaleString("en-US",{timeZone:"America/Santiago"}));return`${s.getFullYear()}-${String(s.getMonth()+1).padStart(2,"0")}-${String(s.getDate()).padStart(2,"0")}`}
/* Before 4AM, we're still "in" the previous day's schedule since all days run until ~3AM */
function getScheduleDate(){
  const n=new Date();const s=new Date(n.toLocaleString("en-US",{timeZone:"America/Santiago"}));
  if(s.getHours()<4){s.setDate(s.getDate()-1)}
  return`${s.getFullYear()}-${String(s.getMonth()+1).padStart(2,"0")}-${String(s.getDate()).padStart(2,"0")}`
}
function getClockStr(){const n=new Date();const s=new Date(n.toLocaleString("en-US",{timeZone:"America/Santiago"}));const h=String(s.getHours()).padStart(2,"0");const m=String(s.getMinutes()).padStart(2,"0");return`${h}:${m}`}

function App(){
  const[sel,setSel]=useState(()=>{const t=getScheduleDate();const i=DAYS.findIndex(d=>d.date===t);return i>=0?i:0});
  const[now,setNow]=useState(getNowMin);
  const[clock,setClock]=useState(getClockStr);
  const curRef=useRef(null);

  useEffect(()=>{const iv=setInterval(()=>{setNow(getNowMin());setClock(getClockStr())},15000);return()=>clearInterval(iv)},[]);
  useEffect(()=>{if(curRef.current)curRef.current.scrollIntoView({behavior:"smooth",block:"center"})},[sel]);

  const day=DAYS[sel];
  /* A day's schedule is "active" if: it's the schedule date (accounting for overnight) */
  const isActive=day.date===getScheduleDate();

  const currentBlock=useMemo(()=>{
    if(!isActive)return-1;
    /* now is 0-1439 (real clock minutes). For overnight blocks (start > end),
       we add 1440 to both end and now-if-small to compare correctly.
       Key fix: only match overnight blocks (start > 720) when now < 240 (before 4AM),
       meaning we're in the tail end. Don't match them when now > 720 (afternoon). */
    for(let i=0;i<day.blocks.length;i++){
      const b=day.blocks[i];
      let sA=t2m(b.s),eA=t2m(b.e);
      const isOvernight=eA<=sA;
      if(isOvernight)eA+=1440;
      let nA=now;
      if(isOvernight&&nA<sA)nA+=1440;
      if(nA>=sA&&nA<eA)return i;
    }
    return-1;
  },[day,now,isActive]);

  const getRemaining=useCallback((b)=>{
    let e=t2m(b.e),s=t2m(b.s),n=now;
    if(e<=s)e+=1440;
    if(n<s)n+=1440;
    return Math.max(0,e-n);
  },[now]);

  return(
    <div style={{background:"#faf9f7",minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative"}}>
      {/* Header */}
      <div style={{padding:"20px 20px 0",position:"sticky",top:0,background:"#faf9f7",zIndex:10}}>
        <div style={{display:"flex",gap:2,marginBottom:12,overflowX:"auto",paddingBottom:6}}>
          {DAYS.map((d,i)=>{
            const dn=new Date(d.date+"T12:00:00").getDate();
            const isSel=i===sel;
            const isT=d.date===getScheduleDate();
            const isExam=d.sum.includes("CONTROL")||d.sum.includes("Solemne");
            return(
              <button key={i} onClick={()=>setSel(i)} style={{
                minWidth:46,padding:"6px 4px",borderRadius:12,border:"none",cursor:"pointer",
                background:isSel?"#1a1a1a":isT?"rgba(231,76,60,0.08)":"transparent",
                display:"flex",flexDirection:"column",alignItems:"center",gap:1,flexShrink:0
              }}>
                <span style={{fontSize:9,color:isSel?"#999":"#999",textTransform:"uppercase",letterSpacing:.5}}>{d.wd.slice(0,3)}</span>
                <span style={{fontSize:16,fontWeight:isSel?700:500,color:isSel?"#fff":isT?"#e74c3c":"#1a1a1a"}}>{dn}</span>
                {isExam&&<span style={{width:5,height:5,borderRadius:"50%",background:"#e74c3c",marginTop:1}}/>}
              </button>
            )
          })}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div>
            <div style={{fontSize:13,color:"#999",fontWeight:500}}>{day.wd}</div>
            <div style={{fontSize:22,fontWeight:700}}>{day.label}</div>
          </div>
          {isActive&&<div style={{fontSize:28,fontWeight:300,fontVariantNumeric:"tabular-nums"}}>{clock}</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10}}>
          {day.alerts.map((a,i)=>(
            <div key={i} style={{fontSize:12,color:"#e67e22",padding:"6px 10px",background:"rgba(230,126,34,0.06)",borderRadius:8}}>{a}</div>
          ))}
        </div>
        <div style={{fontSize:11.5,color:"#666",padding:"8px 12px",background:"#fff",borderRadius:10,marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",border:"1px solid rgba(0,0,0,0.04)"}}>
          {day.sum}
        </div>
      </div>

      {/* Timeline */}
      <div style={{padding:"0 20px 40px"}}>
        {day.blocks.map((b,i)=>{
          const sub=SUB[b.sub];
          const d=dur(b.s,b.e);
          const isCur=i===currentBlock;
          const isPast=isActive&&!isCur&&currentBlock>i;
          const rem=isCur?getRemaining(b):0;
          let gap=0;
          if(i>0){const pe=t2m(day.blocks[i-1].e);const ts=t2m(b.s);gap=ts-pe;if(gap<0)gap+=1440}
          return(
            <div key={i}>
              {gap>0&&gap<300&&(
                <div style={{display:"flex",alignItems:"center",padding:"4px 0 4px 42px",gap:8}}>
                  <div style={{width:1,height:12,background:"#e0e0e0"}}/>
                  <span style={{fontSize:10,color:"#bbb"}}>{fmtDur(gap)} libre</span>
                </div>
              )}
              <div ref={isCur?curRef:null} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"8px 0",opacity:isPast?.4:1,position:"relative"}}>
                <div style={{width:42,flexShrink:0,textAlign:"right",paddingTop:10}}>
                  <div style={{fontSize:11,fontWeight:600,color:isCur?"#e74c3c":"#999",fontVariantNumeric:"tabular-nums"}}>{fmtTime(b.s)}</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,width:20}}>
                  <div style={{
                    width:isCur?14:10,height:isCur?14:10,borderRadius:"50%",
                    background:isCur?sub.color:isPast?"#ddd":sub.color,
                    border:isCur?`3px solid ${sub.color}33`:"none",
                    boxShadow:isCur?`0 0 0 4px ${sub.color}22`:"none",
                    marginTop:10,flexShrink:0
                  }}/>
                  {i<day.blocks.length-1&&(
                    <div style={{width:2,flex:1,minHeight:20,background:isPast?"#e8e8e8":sub.color+"33",marginTop:4}}/>
                  )}
                </div>
                <div style={{
                  flex:1,
                  background:isCur?"#fff":sub.bg,
                  border:isCur?`2px solid ${sub.color}`:`1px solid ${sub.color}22`,
                  borderRadius:14,
                  padding:isCur?"12px 14px":"10px 12px",
                  boxShadow:isCur?`0 4px 16px ${sub.color}20`:"0 1px 2px rgba(0,0,0,0.02)"
                }}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:16}}>{b.icon}</span>
                      <span style={{fontSize:isCur?14:13,fontWeight:isCur?600:500,lineHeight:1.3,textDecoration:isPast?"line-through":"none"}}>{b.t}</span>
                    </div>
                    <span style={{fontSize:11,color:"#999",flexShrink:0,marginLeft:8,fontVariantNumeric:"tabular-nums"}}>{fmtDur(d)}</span>
                  </div>
                  {isCur&&rem>0&&(
                    <div style={{marginTop:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <span style={{fontSize:11,fontWeight:600,color:sub.color}}>{fmtDur(rem)} restantes</span>
                        <span style={{fontSize:10,color:"#bbb"}}>{fmtTime(b.e)}</span>
                      </div>
                      <div style={{height:4,background:sub.color+"22",borderRadius:2}}>
                        <div style={{height:4,background:sub.color,borderRadius:2,width:`${Math.max(5,100-((rem/d)*100))}%`,transition:"width 15s linear"}}/>
                      </div>
                    </div>
                  )}
                  {b.peak&&!isPast&&(
                    <div style={{marginTop:6,fontSize:10,color:sub.color,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
                      <span>⚡</span>PICO COGNITIVO
                    </div>
                  )}
                  <div style={{marginTop:4,fontSize:10,color:sub.color,fontWeight:500}}>{sub.label}</div>
                </div>
              </div>
            </div>
          );
        })}
        <div style={{display:"flex",gap:12,alignItems:"center",padding:"8px 0 0"}}>
          <div style={{width:42}}/>
          <div style={{width:20,display:"flex",justifyContent:"center"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"#ddd"}}/>
          </div>
          <span style={{fontSize:11,color:"#bbb"}}>Fin del día</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
